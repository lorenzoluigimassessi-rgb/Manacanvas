<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shuffle Icon Options</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0c0f;
      font-family: 'Josefin Sans', sans-serif;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .page-label {
      font-size: 0.7rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #8a8a9a;
      margin-bottom: 0.5rem;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }
    .option-label {
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #5a5a6a;
    }
    .btn {
      background: #f0f0f0;
      color: #0c0c0f;
      border: none;
      height: 28px;
      padding: 0 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="page-label">Shuffle Again — Icon Options</div>

<div class="row">

  <!-- A: Classic shuffle arrows (Spotify style) -->
  <div class="option">
    <button class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/>
        <line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/>
        <line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
      Shuffle Again
    </button>
    <div class="option-label">A — Crossing arrows</div>
  </div>

  <!-- B: Two circular arrows -->
  <div class="option">
    <button class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
      Shuffle Again
    </button>
    <div class="option-label">B — Repeat/swap</div>
  </div>

  <!-- C: Single refresh arrow -->
  <div class="option">
    <button class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Shuffle Again
    </button>
    <div class="option-label">C — Refresh</div>
  </div>

  <!-- D: Wand/magic -->
  <div class="option">
    <button class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 4V2"/>
        <path d="M15 16v-2"/>
        <path d="M8 9h2"/>
        <path d="M20 9h2"/>
        <path d="M17.8 11.8 19 13"/>
        <path d="M15 9h0"/>
        <path d="M17.8 6.2 19 5"/>
        <path d="m3 21 9-9"/>
        <path d="M12.2 6.2 11 5"/>
      </svg>
      Shuffle Again
    </button>
    <div class="option-label">D — Magic wand</div>
  </div>

  <!-- E: Zap/lightning -->
  <div class="option">
    <button class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Shuffle Again
    </button>
    <div class="option-label">E — Zap</div>
  </div>

  <!-- F: Rotate CW -->
  <div class="option">
    <button class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6"/>
        <path d="M21.34 15.57a10 10 0 1 1-.57-8.38"/>
      </svg>
      Shuffle Again
    </button>
    <div class="option-label">F — Rotate</div>
  </div>

</div>

</body>
</html>
