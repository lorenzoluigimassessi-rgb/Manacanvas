<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManaCanvas — Style C: Parchment & Ink</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0e8; color: #3d2b1f; font-family: 'Georgia', serif; min-height: 100vh; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; border-bottom: 2px solid #c9a96e; background: linear-gradient(to bottom, #ede4d3, #f5f0e8); }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: #2c1810; letter-spacing: 1px; }
    .header h1::before { content: "⚔ "; }
    .filters { display: flex; gap: 0.5rem; }
    .filters select { background: #ede4d3; color: #3d2b1f; border: 1px solid #c9a96e; padding: 0.4rem 0.8rem; border-radius: 3px; font-family: 'Georgia', serif; font-size: 0.85rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; padding: 2rem; }
    .card { border: 2px solid #c9a96e; border-radius: 4px; overflow: hidden; background: #fff9f0; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 2px 8px rgba(60,30,10,0.1); }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(60,30,10,0.2); border-color: #a07830; }
    .card img { width: 100%; display: block; }
    .card .meta { padding: 0.7rem 0.9rem; border-top: 1px solid #e0d5c0; text-align: center; }
    .card .name { font-size: 0.95rem; font-weight: 700; color: #2c1810; font-style: italic; }
    .card .artist { font-size: 0.8rem; color: #7a5c3a; margin-top: 0.2rem; }
    .card .artist::before { content: "~ "; }
    .card .artist::after { content: " ~"; }
    .label { text-align: center; padding: 2rem; font-size: 0.9rem; color: #9a8060; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ManaCanvas</h1>
    <div class="filters">
      <select><option>All Artists</option><option>Seb McKinnon</option><option>Magali Villeneuve</option></select>
      <select><option>All Creatures</option><option>Dragon</option><option>Angel</option><option>Demon</option></select>
    </div>
  </div>
  <div class="grid">
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/a/a/aab13e40-4c4a-4f0c-9f5f-4b5e32f40a18.jpg?1682720865" alt="Art">
      <div class="meta"><div class="name">Atraxa, Grand Unifier</div><div class="artist">Marta Nael</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/5/6/56c8f82d-d5f1-4797-a861-d2b0a56a68b4.jpg?1682718752" alt="Art">
      <div class="meta"><div class="name">Elesh Norn</div><div class="artist">Magali Villeneuve</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/c/c/cc4e5765-190e-4a93-a9c3-8f3c02e748f0.jpg?1682718320" alt="Art">
      <div class="meta"><div class="name">Sheoldred</div><div class="artist">Chris Rahn</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/1/8/18a2bdc8-b705-4eb5-b3a5-ff2e2ab8f312.jpg?1674421628" alt="Art">
      <div class="meta"><div class="name">Omnath, Locus of All</div><div class="artist">Chase Stone</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/b/e/be8b1acf-dd87-42bf-ad89-bd1ef9cce48c.jpg?1674421762" alt="Art">
      <div class="meta"><div class="name">Phyrexian Vindicator</div><div class="artist">Lie Setiawan</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/3/6/36b4fda4-23b8-4172-8ebe-f3e5765e4a90.jpg?1682718088" alt="Art">
      <div class="meta"><div class="name">Vorinclex</div><div class="artist">Daarken</div></div>
    </div>
  </div>
  <div class="label">Style C — Parchment & Ink · Fantasy-themed with gold accents</div>
</body>
</html>
