<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collections — Artists (Mockup)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #16161c;
      --surface-2: #1e1e28;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text-1: rgba(240,240,240,0.95);
      --text-2: rgba(240,240,240,0.4);
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Josefin Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* Header mock */
    .mock-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .mock-logo {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem; font-weight: 600; letter-spacing: 1.5px;
      flex-shrink: 0;
    }
    .mock-switcher {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
    }
    .mock-sw-btn {
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      font-size: 0.8rem;
      color: var(--text-2);
      border: none;
      background: transparent;
      font-family: inherit;
      cursor: pointer;
    }
    .mock-sw-btn.active {
      background: var(--surface-2);
      color: var(--text-1);
    }

    /* Page content */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Breadcrumb / back */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 150ms, color 150ms;
    }
    .back-btn:hover { border-color: var(--border-hover); color: var(--text-1); }

    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 2px;
    }

    .result-count {
      font-size: 0.75rem;
      color: var(--text-2);
    }

    /* Search */
    .search-row {
      margin-bottom: 1.25rem;
    }
    .search-input {
      width: 100%;
      max-width: 400px;
      height: 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0 1.2rem;
      color: var(--text-1);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 200ms;
    }
    .search-input::placeholder { color: var(--text-2); }
    .search-input:focus { border-color: var(--border-hover); }

    /* Artist grid */
    .artist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* Artist card */
    .artist-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 150ms, border-color 150ms, box-shadow 150ms;
    }
    .artist-card:hover {
      transform: translateY(-3px);
      border-color: var(--border-hover);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    /* Triptych */
    .artist-triptych {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3px;
      padding: 3px;
      aspect-ratio: 3 / 1.1;
    }
    .artist-triptych img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
      background: var(--surface-2);
      display: block;
    }

    /* Text */
    .artist-info {
      padding: 0.75rem 0.85rem 0.85rem;
    }
    .artist-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.2rem;
    }
    .artist-count {
      font-size: 0.75rem;
      color: var(--text-2);
    }

    /* Shimmer placeholder */
    .shimmer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .shimmer-triptych {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3px;
      padding: 3px;
      aspect-ratio: 3 / 1.1;
    }
    .shimmer-img {
      background: var(--surface-2);
      border-radius: 6px;
      animation: pulse 1.5s infinite;
    }
    .shimmer-text {
      padding: 0.75rem 0.85rem 0.85rem;
    }
    .shimmer-line {
      height: 12px;
      background: var(--surface-2);
      border-radius: 4px;
      animation: pulse 1.5s infinite;
    }
    .shimmer-line.short { width: 60%; margin-top: 0.4rem; }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .page { padding: 1rem; }
      .artist-grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .page-title { font-size: 0.95rem; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .artist-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

          <img src="https://cards.scryfall.io/art_crop/front/a/3/a3f64ad2-4041-421d-baa2-206cedcecf42.jpg?1674420638" alt="">
          <img src="https://cards.scryfall.io/art_crop/front/7/8/78a30a39-5e78-4e8b-b4e4-e4e4e4e4e4e4.jpg?1" alt=""

               onerror="this.style.background='var(--surface-2)';this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">

               onerror="this.style.background='var(--surface-2)';this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">
          <img src="https://cards.scryfall.io/art_crop/front/d/4/d4e4e4e4-e4e4-e4e4-e4e4-e4e4e4e4e4e4.jpg?1" alt=""
               onerror="this.style.background='var(--surface-2)';this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">
        </div>

               onerror="this.style.background='var(--surface-2)';this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">
          <img src="https://cards.scryfall.io/art_crop/front/f/6/f6e4e4e4-e4e4-e4e4-e4e4-e4e4e4e4e4e4.jpg?1" alt=""
               onerror="this.style.background='var(--surface-2)';this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">
          <img src="https://cards.scryfall.io/art_crop/front/a/7/a7e4e4e4-e4e4-e4e4-e4e4-e4e4e4e4e4e4.jpg?1" alt=""

  <script>
    const DEMO_ARTISTS = ['Seb McKinnon', 'Magali Villeneuve', 'Rebecca Guay', 'Terese Nielsen', 'Mark Poole', 'Chris Rahn'];

    async function loadDemoArt() {
      const cards = document.querySelectorAll('.artist-card');
      for (let i = 0; i < cards.length && i < DEMO_ARTISTS.length; i++) {
        const artist = DEMO_ARTISTS[i];
        try {
          const url = 'https://api.scryfall.com/cards/search?q=' + encodeURIComponent('a:"' + artist + '" has:illustration') + '&unique=art&order=edhrec&page=1';
          const res = await fetch(url);
          if (!res.ok) continue;
          const json = await res.json();
          const data = json.data || [];
          const imgs = cards[i].querySelectorAll('.artist-triptych img');
          for (let j = 0; j < 3 && j < data.length; j++) {
            const art = data[j].image_uris?.art_crop || data[j].card_faces?.[0]?.image_uris?.art_crop;
            if (art && imgs[j]) {
              imgs[j].onerror = null;
              imgs[j].src = art;
            }
          }
          const countEl = cards[i].querySelector('.artist-count');
          if (countEl) countEl.textContent = (json.total_cards || data.length) + ' cards';
        } catch(e) { console.error(artist, e); }
        await new Promise(r => setTimeout(r, 150));
      }
      document.querySelectorAll('.shimmer-card').forEach(el => el.remove());
    }

    loadDemoArt();
  </script>
</body>
</html>
