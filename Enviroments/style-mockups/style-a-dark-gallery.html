<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManaCanvas — Style A: Dark Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Helvetica Neue', sans-serif; min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; border-bottom: 1px solid #2a2a4a; }
    .header h1 { font-size: 1.4rem; font-weight: 300; letter-spacing: 2px; color: #fff; }
    .filters { display: flex; gap: 0.5rem; }
    .filters select { background: #2a2a4a; color: #ccc; border: 1px solid #3a3a5a; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; padding: 2rem; }
    .card { position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
    .card img { width: 100%; display: block; }
    .card .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 0.8rem; background: linear-gradient(transparent, rgba(0,0,0,0.85)); opacity: 0; transition: opacity 0.2s; }
    .card:hover .overlay { opacity: 1; }
    .overlay .name { font-size: 0.9rem; font-weight: 500; color: #fff; }
    .overlay .artist { font-size: 0.75rem; color: #aaa; margin-top: 0.2rem; }
    .label { text-align: center; padding: 2rem; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>MANACANVAS</h1>
    <div class="filters">
      <select><option>All Artists</option><option>Seb McKinnon</option><option>Magali Villeneuve</option></select>
      <select><option>All Creatures</option><option>Dragon</option><option>Angel</option><option>Demon</option></select>
    </div>
  </div>
  <div class="grid">
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/a/a/aab13e40-4c4a-4f0c-9f5f-4b5e32f40a18.jpg?1682720865" alt="Art">
      <div class="overlay"><div class="name">Atraxa, Grand Unifier</div><div class="artist">Marta Nael</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/5/6/56c8f82d-d5f1-4797-a861-d2b0a56a68b4.jpg?1682718752" alt="Art">
      <div class="overlay"><div class="name">Elesh Norn</div><div class="artist">Magali Villeneuve</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/c/c/cc4e5765-190e-4a93-a9c3-8f3c02e748f0.jpg?1682718320" alt="Art">
      <div class="overlay"><div class="name">Sheoldred</div><div class="artist">Chris Rahn</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/1/8/18a2bdc8-b705-4eb5-b3a5-ff2e2ab8f312.jpg?1674421628" alt="Art">
      <div class="overlay"><div class="name">Omnath, Locus of All</div><div class="artist">Chase Stone</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/b/e/be8b1acf-dd87-42bf-ad89-bd1ef9cce48c.jpg?1674421762" alt="Art">
      <div class="overlay"><div class="name">Phyrexian Vindicator</div><div class="artist">Lie Setiawan</div></div>
    </div>
    <div class="card">
      <img src="https://cards.scryfall.io/art_crop/front/3/6/36b4fda4-23b8-4172-8ebe-f3e5765e4a90.jpg?1682718088" alt="Art">
      <div class="overlay"><div class="name">Vorinclex</div><div class="artist">Daarken</div></div>
    </div>
  </div>
  <div class="label">Style A — Dark Gallery · Hover cards to see metadata</div>
</body>
</html>
