<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ManaCanvas — Flow Test (Wave 2 P2+P3)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0f; --surface: #1a1a22; --border: #2a2a35;
      --text-primary: #f0f0f0; --text-secondary: #8a8a9a;
    }
    body { background: var(--bg); color: var(--text-primary); font-family: 'Josefin Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* ── Welcome ── */
    #welcome {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
      position: relative; background: #0c0c0f;
    }
    #welcomeBg { position: absolute; inset: 0; background-size: cover; background-position: center; }
    .welcome-overlay { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(12,12,15,0.7) 0%, rgba(12,12,15,0.92) 70%, rgba(12,12,15,0.98) 100%); z-index: 1; }
    .welcome-hero { text-align: center; position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
    .welcome-title { font-family: 'Cinzel', serif; font-size: 4rem; font-weight: 600; letter-spacing: 8px; margin-bottom: 0.6rem; }
    .welcome-subtitle { font-size: 0.9rem; color: rgba(240,240,240,0.8); font-weight: 300; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2.5rem; }
    .welcome-cta {
      background: #f0f0f0; border: none; color: #0c0c0f; width: 260px; height: 48px;
      border-radius: 4px; font-size: 1rem; font-weight: 500; cursor: pointer;
      font-family: inherit; letter-spacing: 1px; display: inline-flex; align-items: center;
      justify-content: center; gap: 0.5rem; transition: background 150ms, transform 150ms;
    }
    .welcome-cta:hover { background: #fff; transform: translateY(-2px); }
    .welcome-sep { font-size: 0.75rem; color: rgba(240,240,240,0.4); letter-spacing: 2px; text-transform: uppercase; margin: 1rem 0 0.8rem; }
    .welcome-secondary {
      background: #16161f; border: 1px solid #4a4a60; border-radius: 4px;
      font-family: inherit; font-size: 1rem; font-weight: 400; letter-spacing: 1px;
      cursor: pointer; width: 260px; height: 48px; color: #c8c8e0;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: background 200ms, border-color 200ms, transform 150ms;
    }
    .welcome-secondary:hover { background: #1e1e2e; border-color: #8080a8; color: #e8e8f8; transform: translateY(-2px); }
    .welcome-footer { position: absolute; bottom: 2rem; left: 0; right: 0; text-align: center; font-size: 0.7rem; color: rgba(240,240,240,0.5); z-index: 3; padding: 0 2rem; }

    /* ── Feed ── */
    #feed { display: none; min-height: 100vh; }
    .feed-header {
      position: sticky; top: 0; background: var(--bg); z-index: 50;
      border-bottom: 1px solid var(--border);
    }
    .feed-header-row1 { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1.5rem; }
    .feed-logo { font-family: 'Cinzel', serif; font-size: 1.4rem; letter-spacing: 3px; cursor: pointer; }
    .feed-logo:hover { opacity: 0.7; }
    .feed-header-row2 { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.5rem; background: rgba(26,26,34,0.5); border-top: 1px solid var(--border); }
    .feed-title { font-size: 0.75rem; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; flex: 1; }
    .btn-secondary {
      background: #16161f; border: 1px solid #4a4a60; color: #c8c8e0;
      height: 28px; padding: 0 10px; border-radius: 4px; font-size: 0.8rem;
      font-family: inherit; cursor: pointer; display: inline-flex; align-items: center;
      gap: 0.4rem; transition: background 150ms, border-color 150ms;
    }
    .btn-secondary:hover { background: #1e1e2e; border-color: #8080a8; color: #e8e8f8; }
    .btn-primary {
      background: var(--text-primary); color: var(--bg); border: none;
      height: 28px; padding: 0 10px; border-radius: 4px; font-size: 0.8rem;
      font-family: inherit; cursor: pointer; font-weight: 600;
      display: inline-flex; align-items: center; gap: 0.4rem; transition: background 150ms;
    }
    .btn-primary:hover { background: #d0d0d0; }
    .feed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.8rem; padding: 1.5rem; }
    .feed-card { position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; transition: transform 200ms; }
    .feed-card:hover { transform: translateY(-3px); }
    .feed-card img { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; background: var(--surface); }
    .feed-card .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 0.8rem 0.6rem 0.6rem; background: linear-gradient(transparent, rgba(0,0,0,0.85)); opacity: 0; transition: opacity 200ms; }
    .feed-card:hover .overlay { opacity: 1; }
    .feed-card .overlay .name { font-size: 0.8rem; font-weight: 500; }
    .feed-card .overlay .artist { font-size: 0.68rem; color: rgba(240,240,240,0.5); margin-top: 0.15rem; }
    .shimmer { background: var(--surface); border-radius: 6px; aspect-ratio: 4/3; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.7} }

    /* ── Lightbox ── */
    #lightbox { display: none; position: fixed; inset: 0; z-index: 200; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 2rem 0; }
    .lb-blur-bg { position: absolute; inset: -20px; background-size: cover; background-position: center; pointer-events: none; }
    /* Feed origin — solid dark */
    .lb-origin-feed .lb-blur-bg { filter: blur(60px) brightness(0.15) saturate(1); transform: scale(1.1); }
    /* Welcome origin — lighter blur (Option B) */
    .lb-origin-welcome .lb-blur-bg { filter: blur(28px) brightness(0.5) saturate(1.3); transform: scale(1.1); }
    /* Feed random origin — lighter blur too */
    .lb-origin-feed-random .lb-blur-bg { filter: blur(28px) brightness(0.5) saturate(1.3); transform: scale(1.1); }

    .lb-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; color: var(--text-secondary); font-size: 1.8rem; cursor: pointer; z-index: 210; transition: color 150ms; }
    .lb-close:hover { color: var(--text-primary); }
    .lb-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }
    .lb-art { max-width: 80vw; max-height: 60vh; border-radius: 6px; display: block; object-fit: contain; }
    .lb-toggle { display: flex; margin-top: 1.2rem; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; background: rgba(12,12,15,0.7); backdrop-filter: blur(8px); }
    .lb-toggle button { background: transparent; border: none; color: rgba(240,240,240,0.55); padding: 0.4rem 1rem; font-size: 0.78rem; cursor: pointer; font-family: inherit; transition: background 150ms, color 150ms; }
    .lb-toggle button.active { background: rgba(255,255,255,0.12); color: rgba(240,240,240,0.95); }
    .lb-meta { text-align: center; margin-top: 1.4rem; }
    .lb-meta .name { font-size: 1.05rem; font-weight: 500; }
    .lb-meta .details { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.4rem; }
    .lb-random-btn {
      display: none; margin-top: 2rem; align-items: center; justify-content: center; gap: 0.5rem;
      background: rgba(20,20,28,0.75); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px); border-radius: 24px; color: rgba(240,240,240,0.85);
      font-family: inherit; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.5px;
      cursor: pointer; width: min(300px,80vw); height: 48px;
      transition: background 150ms, border-color 150ms;
    }
    .lb-random-btn:hover { background: rgba(40,40,60,0.85); border-color: rgba(255,255,255,0.25); }
    .lb-random-btn.visible { display: inline-flex; }

    /* Origin badge — for testing visibility */
    .origin-badge {
      position: absolute; top: 1rem; left: 1.5rem; z-index: 210;
      background: rgba(20,20,28,0.8); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px; padding: 0.2rem 0.6rem; font-size: 0.65rem;
      letter-spacing: 1px; text-transform: uppercase; color: rgba(240,240,240,0.5);
    }

    /* Mobile floating pill */
    #randomPill {
      display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      z-index: 100;
    }
    .random-pill-btn {
      background: #16161f; border: 1px solid #4a4a60; color: #c8c8e0;
      height: 48px; padding: 0 1.4rem; border-radius: 24px; font-family: inherit;
      font-size: 0.85rem; font-weight: 500; letter-spacing: 0.5px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: background 150ms, border-color 150ms;
    }
    .random-pill-btn:hover { background: #1e1e2e; border-color: #8080a8; color: #e8e8f8; }

    @media (max-width: 768px) {
      #randomPill { display: block; }
      .feed-header-row2 .btn-secondary.random-btn { display: none; }
      .lb-art { max-width: 95vw; max-height: 50vh; }
    }

    /* Loading spinner */
    #spinner { display: none; position: fixed; inset: 0; z-index: 500; background: #0c0c0f; align-items: center; justify-content: center; }
    .spinner-icon { width: 48px; height: 48px; color: rgba(240,240,240,0.5); animation: pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>

<!-- Welcome -->
<div id="welcome">
  <div id="welcomeBg"></div>
  <div class="welcome-overlay"></div>
  <div class="welcome-hero">
    <h1 class="welcome-title">MANACANVAS</h1>
    <p class="welcome-subtitle">Discover the art of Magic: The Gathering®</p>
    <button class="welcome-cta" id="btnRandomArt">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      Random Art
    </button>
    <p class="welcome-sep">or</p>
    <button class="welcome-secondary" id="btnBrowse">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Browse the Gallery
    </button>
  </div>
  <footer class="welcome-footer">ManaCanvas is unofficial Fan Content, not approved/endorsed by Wizards of the Coast. Card images © Wizards of the Coast.</footer>
</div>

<!-- Feed -->
<div id="feed">
  <header class="feed-header">
    <div class="feed-header-row1">
      <div class="feed-logo" id="feedLogo">MANACANVAS</div>
    </div>
    <div class="feed-header-row2">
      <span class="feed-title" id="feedTitle">All Art</span>
      <!-- P3: Random Art button in feed — desktop only -->
      <button class="btn-secondary random-btn" id="btnFeedRandom">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Random Art
      </button>
      <button class="btn-primary" id="btnShuffle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Shuffle
      </button>
    </div>
  </header>
  <div class="feed-grid" id="feedGrid"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div class="lb-blur-bg" id="lbBg"></div>
  <div class="origin-badge" id="originBadge"></div>
  <button class="lb-close" id="lbClose">✕</button>
  <div class="lb-content">
    <img class="lb-art" id="lbArt" src="" alt="">
    <div class="lb-toggle">
      <button class="active">Art Only</button>
      <button>With Frame</button>
    </div>
    <div class="lb-meta">
      <div class="name" id="lbName"></div>
      <div class="details" id="lbDetails"></div>
    </div>
    <button class="lb-random-btn" id="lbRandomBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      Random Art
    </button>
  </div>
</div>

<!-- Mobile random pill -->
<div id="randomPill">
  <button class="random-pill-btn" id="btnMobileRandom">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    Random Art
  </button>
</div>

<!-- Spinner -->
<div id="spinner">
  <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
  </svg>
</div>

<script>
  const API = 'https://api.scryfall.com';
  let _origin = 'welcome'; // P2: track lightbox origin
  let _cards = [];
  let _pool = []; // random card pool

  // ── Fetch helpers ──────────────────────────────────────────────────────────
  async function fetchGrid() {
    const page = Math.floor(Math.random() * 50) + 1;
    const res = await fetch(`${API}/cards/search?q=t:creature+has:illustration&unique=art&order=released&dir=desc&page=${page}`);
    if (!res.ok) return [];
    const json = await res.json();
    return json.data || [];
  }

  async function fillPool() {
    if (_pool.length > 5) return;
    const page = Math.floor(Math.random() * 80) + 1;
    const res = await fetch(`${API}/cards/search?q=has:illustration&unique=art&order=released&dir=asc&page=${page}`);
    if (!res.ok) return;
    const json = await res.json();
    const cards = (json.data || []).filter(c => c.image_uris?.art_crop);
    _pool.push(...cards.sort(() => Math.random() - 0.5));
  }

  async function getRandomCard() {
    if (_pool.length < 3) await fillPool();
    return _pool.shift() || null;
  }

  // ── Welcome ────────────────────────────────────────────────────────────────
  async function initWelcome() {
    const res = await fetch(`${API}/cards/random?q=t:dragon+is:hires`);
    if (res.ok) {
      const card = await res.json();
      const art = card.image_uris?.art_crop;
      if (art) document.getElementById('welcomeBg').style.backgroundImage = `url('${art}')`;
    }
    fillPool(); // pre-warm pool
  }

  function showWelcome() {
    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('feed').style.display = 'none';
    document.getElementById('lightbox').style.display = 'none';
    document.getElementById('randomPill').style.display = 'none';
    document.body.style.overflow = '';
  }

  // ── Feed ───────────────────────────────────────────────────────────────────
  async function showFeed() {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('feed').style.display = 'block';
    document.getElementById('randomPill').style.display = '';
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
    if (_cards.length === 0) await loadGrid();
  }

  async function loadGrid() {
    const grid = document.getElementById('feedGrid');
    grid.innerHTML = Array(12).fill('<div class="shimmer"></div>').join('');
    _cards = await fetchGrid();
    grid.innerHTML = '';
    _cards.forEach(card => {
      const art = card.image_uris?.art_crop;
      if (!art) return;
      const el = document.createElement('div');
      el.className = 'feed-card';
      el.innerHTML = `<img src="${art}" alt="${card.name}" loading="lazy"><div class="overlay"><div class="name">${card.name}</div><div class="artist">${card.artist || ''}</div></div>`;
      el.addEventListener('click', () => openLightbox(card, 'feed'));
      grid.appendChild(el);
    });
  }

  // ── Lightbox ───────────────────────────────────────────────────────────────
  function openLightbox(card, origin) {
    _origin = origin;
    const art = card.image_uris?.art_crop || card.card_faces?.[0]?.image_uris?.art_crop;
    document.getElementById('lbArt').src = art;
    document.getElementById('lbBg').style.backgroundImage = `url('${art}')`;
    document.getElementById('lbName').textContent = card.name;
    document.getElementById('lbDetails').textContent = `${card.artist || 'Unknown'} · ${card.set_name || ''} · ${card.released_at?.slice(0,4) || ''}`;

    // P2: set background class based on origin
    const lb = document.getElementById('lightbox');
    lb.className = '';
    lb.style.display = 'flex';
    lb.classList.add(`lb-origin-${origin}`);

    // P3: show Random Art button only in surprise/random contexts
    const randomBtn = document.getElementById('lbRandomBtn');
    randomBtn.classList.toggle('visible', origin === 'welcome' || origin === 'feed-random');

    // Origin badge (test helper)
    const badge = document.getElementById('originBadge');
    const labels = { welcome: '← from welcome', feed: '← from feed', 'feed-random': '← from feed random' };
    badge.textContent = labels[origin] || origin;

    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
    // P2: return to origin
    if (_origin === 'welcome') showWelcome();
    else showFeed();
  }

  // ── Event wiring ───────────────────────────────────────────────────────────
  // Welcome
  document.getElementById('btnRandomArt').addEventListener('click', async () => {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('feed').style.display = 'block';
    document.getElementById('spinner').style.display = 'flex';
    const card = await getRandomCard();
    document.getElementById('spinner').style.display = 'none';
    if (card) openLightbox(card, 'welcome');
    loadGrid(); // load feed in background
  });

  document.getElementById('btnBrowse').addEventListener('click', () => showFeed());

  // Feed logo — back to welcome
  document.getElementById('feedLogo').addEventListener('click', showWelcome);

  // Feed random button (P3 — desktop)
  document.getElementById('btnFeedRandom').addEventListener('click', async () => {
    document.getElementById('spinner').style.display = 'flex';
    const card = await getRandomCard();
    document.getElementById('spinner').style.display = 'none';
    if (card) openLightbox(card, 'feed-random');
  });

  // Mobile random pill (P3 — mobile)
  document.getElementById('btnMobileRandom').addEventListener('click', async () => {
    document.getElementById('spinner').style.display = 'flex';
    const card = await getRandomCard();
    document.getElementById('spinner').style.display = 'none';
    if (card) openLightbox(card, 'feed-random');
  });

  // Shuffle
  document.getElementById('btnShuffle').addEventListener('click', async () => {
    _cards = [];
    await loadGrid();
  });

  // Lightbox close
  document.getElementById('lbClose').addEventListener('click', closeLightbox);

  // Lightbox random next
  document.getElementById('lbRandomBtn').addEventListener('click', async () => {
    const card = await getRandomCard();
    if (card) openLightbox(card, _origin);
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  initWelcome();
</script>
</body>
</html>
