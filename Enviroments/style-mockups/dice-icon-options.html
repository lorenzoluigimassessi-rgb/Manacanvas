<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dice Icon Options</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0c0f;
      font-family: 'Josefin Sans', sans-serif;
      display: flex;
      gap: 3rem;
      padding: 3rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .option { display: flex; flex-direction: column; gap: 1rem; }
    .label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #8a8a9a; }

    /* Simulate the actual buttons */
    .random-feed-btn {
      background: #16161f;
      border: 1px solid #4a4a60;
      color: #c8c8e0;
      height: 32px;
      padding: 0 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .random-btn {
      margin-top: 0.75rem;
      background: #16161f;
      border: 1px solid #4a4a60;
      color: #c8c8e0;
      font-size: 0.85rem;
      padding: 0.4rem 1.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .shuffle-again-btn {
      background: #f0f0f0;
      color: #0c0c0f;
      border: none;
      height: 28px;
      padding: 0 0.9rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .divider {
      width: 1px;
      height: 60px;
      background: #2a2a35;
    }

    .btn-row { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
  </style>
</head>
<body>

  <!-- Option A: Classic dice-6 outline -->
  <div class="option">
    <div class="label">Option A — Classic Dice</div>
    <div class="btn-row">
      <button class="random-feed-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="3" ry="3"/>
          <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        Surprise Me
      </button>

      <button class="random-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="3" ry="3"/>
          <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        Surprise Me
      </button>

      <button class="shuffle-again-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="3" ry="3"/>
          <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        Shuffle Again
      </button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Option B: Dice-3 minimal -->
  <div class="option">
    <div class="label">Option B — Minimal Dice (3 dots)</div>
    <div class="btn-row">
      <button class="random-feed-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="4" ry="4"/>
          <circle cx="8" cy="8" r="1.8" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1.8" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="16" r="1.8" fill="currentColor" stroke="none"/>
        </svg>
        Surprise Me
      </button>

      <button class="random-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="4" ry="4"/>
          <circle cx="8" cy="8" r="1.8" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1.8" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="16" r="1.8" fill="currentColor" stroke="none"/>
        </svg>
        Surprise Me
      </button>

      <button class="shuffle-again-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0c0c0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="4" ry="4"/>
          <circle cx="8" cy="8" r="1.8" fill="#0c0c0f" stroke="none"/>
          <circle cx="12" cy="12" r="1.8" fill="#0c0c0f" stroke="none"/>
          <circle cx="16" cy="16" r="1.8" fill="#0c0c0f" stroke="none"/>
        </svg>
        Shuffle Again
      </button>
    </div>
  </div>

</body>
</html>
