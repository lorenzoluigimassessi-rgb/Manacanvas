<!DOCTYPE html>
<html lang="en" data-mode="gallery">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ManaCanvas — Cosmos Nav Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Josefin+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0c0c0f;
      --surface:      #16161c;
      --surface-2:    #1e1e28;
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text-1:       rgba(240,240,240,0.95);
      --text-2:       rgba(240,240,240,0.4);
      --text-3:       rgba(240,240,240,0.25);
      --gold:         #d4af37;
      --gold-dim:     rgba(212,175,55,0.65);
      --gold-border:  rgba(212,175,55,0.3);
      --radius-pill:  999px;
      --header-h:     48px;
      --ease:         cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Josefin Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      background: transparent;
    }

    /* ── LEFT GROUP ── */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    /* MC dot logo — standalone pill, separate from switcher */
    .nav-logo {
      width: var(--header-h);
      height: var(--header-h);
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 150ms, border-color 150ms;
      text-decoration: none;
    }
    .nav-logo:hover { background: var(--surface-2); border-color: var(--border-hover); }
    .nav-logo-text {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--text-1);
      line-height: 1;
    }

    /* Gallery / Collections switcher — its own pill */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .nav-switcher {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      height: var(--header-h);
      padding: 4px;
      gap: 2px;
    }
    .nav-switch-btn {
      background: transparent;
      border: none;
      color: var(--text-2);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      padding: 0.35rem 0.9rem;
      border-radius: var(--radius-pill);
      cursor: pointer;
      white-space: nowrap;
      transition: background 150ms, color 150ms;
    }
    .nav-switch-btn:hover { color: var(--text-1); }
    .nav-switch-btn.active {
      background: var(--surface-2);
      color: var(--text-1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* ── CENTER PILL: search + advanced ── */
    .nav-center {
      flex: 1;
      max-width: 580px;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      height: var(--header-h);
      padding: 4px 4px 4px 1.1rem;
      gap: 0.5rem;
      transition: border-color 200ms;
    }
    .nav-center:focus-within { border-color: var(--border-hover); }

    .nav-search-icon {
      color: var(--text-2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .nav-search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-1);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.2px;
      min-width: 0;
    }
    .nav-search-input::placeholder { color: var(--text-2); }

    /* vertical divider */
    .nav-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Advanced button inside search pill */
    .nav-advanced-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: transparent;
      border: none;
      color: var(--text-2);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      padding: 0.35rem 0.85rem;
      border-radius: var(--radius-pill);
      cursor: pointer;
      white-space: nowrap;
      height: calc(var(--header-h) - 8px);
      transition: background 150ms, color 150ms;
      flex-shrink: 0;
    }
    .nav-advanced-btn:hover { background: var(--surface-2); color: var(--text-1); }
    .nav-advanced-btn.active { background: var(--surface-2); color: var(--text-1); }

    /* ── RIGHT PILL: Discover ── */
    .nav-right {
      flex-shrink: 0;
    }

    .nav-discover-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius-pill);
      height: var(--header-h);
      padding: 0 1.2rem;
      color: var(--gold-dim);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 150ms, border-color 150ms, color 150ms, box-shadow 150ms;
      animation: discoverPulse 3s ease-in-out infinite;
    }
    .nav-discover-btn:hover {
      background: rgba(212,175,55,0.07);
      border-color: rgba(212,175,55,0.65);
      color: var(--gold);
      box-shadow: 0 0 16px rgba(212,175,55,0.18);
      animation: none;
    }
    .nav-discover-btn.active {
      background: rgba(212,175,55,0.1);
      border-color: rgba(212,175,55,0.7);
      color: var(--gold);
      animation: none;
    }

    @keyframes discoverPulse {
      0%,100% { border-color: rgba(212,175,55,0.3); box-shadow: none; }
      50%      { border-color: rgba(212,175,55,0.55); box-shadow: 0 0 10px rgba(212,175,55,0.12); }
    }

    /* ── LENS CHIPS ROW ── */
    .lens-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .lens-row::-webkit-scrollbar { display: none; }

    .lens-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-2);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      padding: 0.32rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 150ms, border-color 150ms, color 150ms;
      flex-shrink: 0;
    }
    .lens-chip:hover { border-color: var(--border-hover); color: var(--text-1); }
    .lens-chip.active {
      background: var(--surface);
      border-color: rgba(255,255,255,0.2);
      color: var(--text-1);
    }

    /* ── MOCK CONTENT ── */
    .mock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      padding: 1.5rem 1.25rem;
    }
    .mock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      aspect-ratio: 4/3;
      animation: shimmer 1.8s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:0.35} 50%{opacity:0.6} }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .header { padding: 0.75rem; gap: 0.5rem; }

      /* hide switcher on mobile — lives in floating pill */
      .nav-switcher { display: none; }

      /* center pill goes full width */
      .nav-center { max-width: none; }

      /* hide advanced label on mobile */
      .nav-advanced-label { display: none; }

      /* hide discover on top bar mobile */
      .nav-right { display: none; }

      /* floating switcher pill */
      .mobile-switcher {
        display: flex;
        position: fixed;
        bottom: calc(1.75rem + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        z-index: 60;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        padding: 4px;
        gap: 2px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      }
      .mobile-switcher .nav-switch-btn { font-size: 0.82rem; padding: 0.5rem 1.1rem; }

      /* floating discover pill */
      .mobile-discover {
        display: flex;
        position: fixed;
        bottom: calc(1.75rem + env(safe-area-inset-bottom));
        right: 1rem;
        z-index: 60;
      }
      .mobile-discover .nav-discover-btn { font-size: 0.78rem; padding: 0 1rem; height: 44px; }

      .mock-grid { grid-template-columns: 1fr 1fr; gap: 0.6rem; padding: 1rem 0.75rem 8rem; }
    }

    @media (min-width: 769px) {
      .mobile-switcher, .mobile-discover { display: none; }
    }

    /* ── STATE LABELS ── */
    .state-label {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.7rem;
      color: var(--text-3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── RESIZE DEMO ── */
    .demo-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(12,12,15,0.9);
      border-top: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--text-3);
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .demo-bar span { color: var(--text-2); }
    @media (max-width: 768px) { .demo-bar { display: none; } }
  </style>
</head>
<body>

  <!-- ══ DESKTOP + MOBILE TOP BAR ══ -->
  <header class="header">

    <!-- LEFT: logo (standalone circle) + switcher (separate pill) -->
    <div class="nav-left">
      <a class="nav-logo" href="#" onclick="setMode('gallery'); return false;" title="Home">
        <span class="nav-logo-text">MC</span>
      </a>
      <div class="nav-switcher">
        <button class="nav-switch-btn active" id="btnGallery" onclick="setMode('gallery')">Gallery</button>
        <button class="nav-switch-btn" id="btnCollections" onclick="setMode('collections')">Collections</button>
      </div>
    </div>

    <!-- CENTER: search pill + advanced -->
    <div class="nav-center">
      <span class="nav-search-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input class="nav-search-input" type="text" placeholder="Search cards, artists, creatures…" id="searchInput">
      <div class="nav-divider"></div>
      <button class="nav-advanced-btn" id="btnAdvanced" onclick="setMode('advanced')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
        </svg>
        <span class="nav-advanced-label">Advanced</span>
      </button>
    </div>

    <!-- RIGHT: Discover pill -->
    <div class="nav-right">
      <button class="nav-discover-btn" id="btnDiscover" onclick="setMode('discover')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        Discover
      </button>
    </div>
  </header>

  <!-- ══ LENS CHIPS (Gallery only) ══ -->
  <div class="lens-row" id="lensRow">
    <button class="lens-chip active" onclick="setLens(this)">Newest</button>
    <button class="lens-chip" onclick="setLens(this)">Time Machine</button>
    <button class="lens-chip" onclick="setLens(this)">Creature Type</button>
    <button class="lens-chip" onclick="setLens(this)">Art Style</button>
    <button class="lens-chip" onclick="setLens(this)">Mana Color</button>
  </div>

  <!-- ══ MOCK CONTENT ══ -->
  <div class="state-label" id="stateLabel">Gallery — Newest</div>
  <div class="mock-grid" id="mockGrid"></div>

  <!-- ══ MOBILE FLOATING ELEMENTS ══ -->
  <div class="mobile-switcher">
    <button class="nav-switch-btn active" id="mBtnGallery" onclick="setMode('gallery')">Gallery</button>
    <button class="nav-switch-btn" id="mBtnCollections" onclick="setMode('collections')">Collections</button>
  </div>

  <div class="mobile-discover">
    <button class="nav-discover-btn" id="mBtnDiscover" onclick="setMode('discover')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      Discover
    </button>
  </div>

  <!-- ══ DEMO BAR (desktop only) ══ -->
  <div class="demo-bar">
    <span>Resize to test mobile ↔ desktop</span>
    <span id="vpWidth"></span>
    <span>·</span>
    <span>Current mode: <span id="currentMode">gallery</span></span>
  </div>

  <script>
    // ── Mock grid ──
    const grid = document.getElementById('mockGrid');
    for (let i = 0; i < 18; i++) {
      const d = document.createElement('div');
      d.className = 'mock-card';
      d.style.animationDelay = (i * 0.07) + 's';
      grid.appendChild(d);
    }

    // ── Mode switching ──
    let _mode = 'gallery';

    function setMode(mode) {
      _mode = mode;
      document.documentElement.dataset.mode = mode;

      // desktop switcher
      document.getElementById('btnGallery').classList.toggle('active', mode === 'gallery');
      document.getElementById('btnCollections').classList.toggle('active', mode === 'collections');
      document.getElementById('btnAdvanced').classList.toggle('active', mode === 'advanced');
      document.getElementById('btnDiscover').classList.toggle('active', mode === 'discover');

      // mobile switcher
      document.getElementById('mBtnGallery').classList.toggle('active', mode === 'gallery');
      document.getElementById('mBtnCollections').classList.toggle('active', mode === 'collections');
      document.getElementById('mBtnDiscover').classList.toggle('active', mode === 'discover');

      // lens chips — only in gallery
      document.getElementById('lensRow').style.display = mode === 'gallery' ? '' : 'none';

      // state label
      const labels = {
        gallery: 'Gallery — Newest',
        collections: 'Collections — folder browser',
        advanced: 'Advanced — form-first search',
        discover: '✦ Discover — random card lightbox'
      };
      document.getElementById('stateLabel').textContent = labels[mode] || mode;
      document.getElementById('currentMode').textContent = mode;
    }

    // ── Lens chips ──
    function setLens(el) {
      document.querySelectorAll('.lens-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('stateLabel').textContent = 'Gallery — ' + el.textContent;
    }

    // ── Viewport width indicator ──
    function updateVp() {
      document.getElementById('vpWidth').textContent = window.innerWidth + 'px';
    }
    window.addEventListener('resize', updateVp);
    updateVp();
  </script>
</body>
</html>
