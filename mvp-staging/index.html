<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ManaCanvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

</head>
<body>
  <div id="welcome"></div>

  <!-- Transition screen -->
  <div id="transition">
    <svg class="transition-dice" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="4" ry="4"/>
      <circle cx="8" cy="8" r="1.8" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="12" r="1.8" fill="currentColor" stroke="none"/>
      <circle cx="16" cy="16" r="1.8" fill="currentColor" stroke="none"/>
    </svg>
  </div>
  <div id="appShell" data-mode="gallery" data-theme="dark" style="display:none;">

    <!-- Desktop header -->
    <div class="header-wrap">
      <header class="header">
        <div class="nav-left">
          <a class="nav-logo" onclick="goHome()">
            <span class="nav-logo-text">MC</span>
          </a>
          <div class="nav-switcher">
            <button class="sw-btn active" id="swAllArt" onclick="setMode('gallery')">All Art</button>
            <button class="sw-btn" id="swBrowse" onclick="setMode('collections')">Browse</button>
            <button class="sw-btn" id="swDiscover" onclick="setMode('discover')">Discover</button>
          </div>
        </div>

        <div class="nav-center" id="searchContainer">
          <svg class="search-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-bar" id="searchBar" placeholder="Search card, artist, creature...">
          <span class="search-clear" id="searchClear" style="display:none;">✕</span>
          <div class="search-suggestions" id="searchSuggestions" style="display:none;"></div>
          <div class="search-sep"></div>
          <button class="btn-advanced" id="navAdvanced" onclick="setMode('advanced')" title="Advanced">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          </button>
        </div>

        <div class="nav-right">
          <div class="theme-sw">
            <button class="theme-btn active" id="btnDark" onclick="setTheme('dark')" title="Dark">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="theme-btn" id="btnLight" onclick="setTheme('light')" title="Light">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Lens chips row — gallery only -->
      <div class="header-chips" id="chipBar" style="display:none;">
        <div class="chip-list" id="chipList"></div>
      </div>
    </div>

    <!-- Mobile top bar -->
    <div class="mobile-top-bar">
      <a class="nav-logo" onclick="goHome()">
        <span class="nav-logo-text">MC</span>
      </a>
      <div class="nav-center mobile-search" id="mobileSearchContainer">
        <svg class="search-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-bar" id="mobileSearchBar" placeholder="Search card, artist, creature...">
        <div class="search-sep"></div>
        <button class="btn-advanced" title="Advanced" onclick="setMode('advanced')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- More Filters Modal -->
    <div class="more-modal-overlay" id="moreModalOverlay" style="display:none;" onclick="closeMoreModal()"></div>
    <div class="more-modal" id="moreModal" style="display:none;">
      <div class="more-modal-header">
        <span class="more-modal-title">More Filters</span>
        <button class="more-modal-close" onclick="closeMoreModal()">✕</button>
      </div>
      <div class="more-modal-body" id="moreModalBody"></div>
      <div class="more-modal-footer">
        <span class="more-modal-clear" onclick="clearMoreFilters()">Clear all</span>
        <button class="more-modal-apply" onclick="applyMoreModal()">Show Results</button>
      </div>
    </div>

    <!-- Mobile filter sheet -->
    <div class="drawer-overlay" id="drawerOverlay" style="display:none;" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <div class="drawer-handle" onclick="closeDrawer()"></div>
      <div class="drawer-header">
        <span class="drawer-title">Filters</span>
        <span class="drawer-clear" onclick="clearAllFilters()">Clear all</span>
      </div>
      <div class="drawer-body" id="drawerBody"></div>
      <div class="drawer-footer">
        <button class="drawer-apply-btn" onclick="applySheet()">SHOW RESULTS</button>
      </div>
    </div>
    <!-- Legacy hidden elements for JS compatibility -->
    <div id="headerRow2" style="display:none;">
      <div class="filters" id="filters"></div>
      <button class="clear-filters-btn" id="clearFiltersBtn" style="display:none;" onclick="clearAllFilters()">Clear all</button>
      <div class="row2-right" id="row2Right"></div>
    </div>

    <!-- Mode panels -->
    <main class="grid" id="grid"></main>
    <div class="loading-more" id="loader" style="display:none;">Loading more artwork...</div>

    <div id="collectionsPanel" class="mode-panel">
      <div class="cat-search-row">
        <div class="search-container">
          <svg class="search-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-bar" id="catSearchBar" placeholder="Search collections...">
        </div>
      </div>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <div id="advancedPanel" class="mode-panel">
      <div class="advanced-placeholder">Advanced search — coming in Step 5</div>
    </div>

    <div id="discoverPanel" class="mode-panel"></div>

    <!-- Legacy categories panel alias for existing JS -->
    <div id="categoriesPanel" style="display:none;"></div>

    <div id="lightbox"></div>

    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <!-- Mobile floating switcher -->
    <nav class="mobile-float" id="mobileFloat">
      <button class="sw-btn active" id="mSwAllArt" onclick="setMode('gallery')">All Art</button>
      <button class="sw-btn" id="mSwBrowse" onclick="setMode('collections')">Browse</button>
      <button class="sw-btn" id="mSwDiscover" onclick="setMode('discover')">Discover</button>
    </nav>

    <footer class="site-footer">
      <p>ManaCanvas is unofficial Fan Content, not approved/endorsed by Wizards of the Coast. Card images &copy; Wizards of the Coast.</p>
    </footer>
  </div><!-- end appShell -->

<script src="js/welcome.js"></script>
  <script src="js/api.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/lightbox.js"></script>
  <script>
    // ── Mode switching ──────────────────────────────────────────────────────
    const DESKTOP_SW = { gallery:'swAllArt', collections:'swBrowse', discover:'swDiscover', advanced:'navAdvanced' };
    const MOBILE_SW  = { gallery:'mSwAllArt', collections:'mSwBrowse', discover:'mSwDiscover' };
    const PANELS     = { gallery:'grid', collections:'collectionsPanel', advanced:'advancedPanel', discover:'discoverPanel' };

    let _currentMode = 'gallery';

    function setMode(mode) {
      _currentMode = mode;
      document.getElementById('appShell').dataset.mode = mode;

      // panels
      ['grid','collectionsPanel','advancedPanel','discoverPanel'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const loader = document.getElementById('loader');
      if (loader) loader.style.display = 'none';
      const panel = document.getElementById(PANELS[mode]);
      if (panel) panel.style.display = '';

      // desktop switcher
      document.querySelectorAll('.sw-btn, .btn-advanced').forEach(b => b.classList.remove('active'));
      if (DESKTOP_SW[mode]) document.getElementById(DESKTOP_SW[mode])?.classList.add('active');

      // mobile switcher
      document.querySelectorAll('.mobile-float .sw-btn').forEach(b => b.classList.remove('active'));
      if (MOBILE_SW[mode]) document.getElementById(MOBILE_SW[mode])?.classList.add('active');

      // lens chips — gallery only
      const chipBar = document.getElementById('chipBar');
      if (chipBar) chipBar.style.display = mode === 'gallery' ? '' : 'none';

      // load content
      if (mode === 'gallery' && filteredCards.length === 0) loadInitialGrid();
      if (mode === 'collections') renderCategories();
      if (mode === 'discover') triggerSurprise();
    }

    function goHome() {
      if (!localStorage.getItem('mc_entered')) { showWelcome(); return; }
      setMode('gallery');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setTheme(t) {
      document.getElementById('appShell').dataset.theme = t;
      document.getElementById('btnDark')?.classList.toggle('active', t === 'dark');
      document.getElementById('btnLight')?.classList.toggle('active', t === 'light');
    }
  </script>
</body>
</html>
