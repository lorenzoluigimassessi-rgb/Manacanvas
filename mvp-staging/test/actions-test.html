<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ManaCanvas — Actions Test (Wave 2 P5+P7)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0c0c0f; --surface: #1a1a22; --border: #2a2a35; --text-primary: #f0f0f0; --text-secondary: #8a8a9a; }
    body { background: var(--bg); color: var(--text-primary); font-family: 'Josefin Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; gap: 2rem; }

    h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 3px; text-align: center; }
    .subtitle { font-size: 0.75rem; color: var(--text-secondary); letter-spacing: 1px; text-align: center; }

    /* Lightbox mockup */
    .lb-mock {
      position: relative; width: min(380px, 95vw); background: #0c0c0f;
      border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 1.2rem;
    }
    .lb-blur-bg { position: absolute; inset: -20px; background-size: cover; background-position: center; filter: blur(28px) brightness(0.5) saturate(1.3); transform: scale(1.1); pointer-events: none; }
    .lb-close { position: absolute; top: 0.8rem; right: 1rem; background: none; border: none; color: var(--text-secondary); font-size: 1.6rem; cursor: pointer; z-index: 2; }
    .lb-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
    .lb-art { width: 100%; border-radius: 6px; display: block; aspect-ratio: 4/3; object-fit: cover; background: var(--surface); }
    .lb-toggle { display: flex; margin-top: 1rem; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; background: rgba(12,12,15,0.7); backdrop-filter: blur(8px); }
    .lb-toggle button { background: transparent; border: none; color: rgba(240,240,240,0.55); padding: 0.4rem 1rem; font-size: 0.78rem; cursor: pointer; font-family: inherit; }
    .lb-toggle button.active { background: rgba(255,255,255,0.12); color: rgba(240,240,240,0.95); }
    .lb-meta { text-align: center; margin-top: 1.2rem; width: 100%; }
    .lb-meta .name { font-size: 1rem; font-weight: 500; }
    .lb-meta .details { font-size: 0.78rem; color: var(--text-secondary); margin-top: 0.35rem; }

    /* ── Desktop action row ── */
    .lb-actions-desktop {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap;
    }
    .action-btn {
      background: rgba(20,20,28,0.75); border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px); border-radius: 6px; color: rgba(240,240,240,0.75);
      font-family: inherit; font-size: 0.72rem; letter-spacing: 0.5px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.35rem 0.7rem; height: 30px; transition: background 150ms, border-color 150ms, color 150ms;
      white-space: nowrap;
    }
    .action-btn:hover { background: rgba(40,40,60,0.9); border-color: rgba(255,255,255,0.25); color: rgba(240,240,240,0.95); }
    .action-btn svg { flex-shrink: 0; }

    /* ── Mobile action sheet ── */
    .lb-more-btn {
      background: none; border: none; color: var(--text-secondary);
      font-size: 1.2rem; cursor: pointer; padding: 0.3rem 0.5rem;
      letter-spacing: 2px; transition: color 150ms; margin-top: 0.5rem;
    }
    .lb-more-btn:hover { color: var(--text-primary); }

    .action-sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; }
    .action-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a22;
      border-radius: 16px 16px 0 0; z-index: 310; padding: 0.8rem 0 1.5rem;
      transform: translateY(100%); transition: transform 280ms ease;
    }
    .action-sheet.open { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: rgba(240,240,240,0.3); border-radius: 2px; margin: 0 auto 1rem; }
    .sheet-title { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-secondary); text-align: center; margin-bottom: 0.8rem; padding: 0 1.5rem; }
    .sheet-item {
      display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1.5rem;
      cursor: pointer; font-size: 0.9rem; color: var(--text-primary);
      transition: background 150ms; min-height: 52px;
    }
    .sheet-item:hover { background: rgba(255,255,255,0.04); }
    .sheet-item .icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sheet-item .icon.copy { background: #2a2a3e; }
    .sheet-item .icon.share { background: #1a2e1a; }
    .sheet-item .icon.tcg { background: #2e1a1a; }
    .sheet-item .icon.cm { background: #1a1a2e; }
    .sheet-item .label { display: flex; flex-direction: column; gap: 0.1rem; }
    .sheet-item .label .title { font-size: 0.88rem; }
    .sheet-item .label .desc { font-size: 0.72rem; color: var(--text-secondary); }
    .sheet-divider { height: 1px; background: var(--border); margin: 0.3rem 1.5rem; }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(240,240,240,0.95); color: #0c0c0f; padding: 0.5rem 1.2rem;
      border-radius: 20px; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.5px;
      opacity: 0; transition: opacity 200ms, transform 200ms; z-index: 400; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* View toggle */
    .view-toggle { display: flex; gap: 0.5rem; }
    .view-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.4rem 0.9rem; border-radius: 4px; font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all 150ms; }
    .view-btn.active { border-color: var(--text-primary); color: var(--text-primary); }

    @media (min-width: 769px) {
      .lb-more-btn { display: none; }
    }
    @media (max-width: 768px) {
      .lb-actions-desktop { display: none; }
    }
  </style>
</head>
<body>

<h2>CARD ACTIONS</h2>
<p class="subtitle">Desktop: icon row below meta · Mobile: ··· → action sheet</p>

<div class="view-toggle">
  <button class="view-btn active" id="btnDesktopView">Desktop view</button>
  <button class="view-btn" id="btnMobileView">Mobile view</button>
  <button class="view-btn" id="btnLoadNew">New card</button>
</div>

<div class="lb-mock" id="lbMock">
  <div class="lb-blur-bg" id="lbBg"></div>
  <button class="lb-close">✕</button>
  <div class="lb-content">
    <img class="lb-art" id="lbArt" src="" alt="">
    <div class="lb-toggle">
      <button class="active">Art Only</button>
      <button>With Frame</button>
    </div>
    <div class="lb-meta">
      <div class="name" id="lbName">Loading...</div>
      <div class="details" id="lbDetails"></div>
    </div>

    <!-- Desktop action row -->
    <div class="lb-actions-desktop" id="actionsDesktop">
      <button class="action-btn" id="btnCopy">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy link
      </button>
      <button class="action-btn" id="btnShare">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <button class="action-btn" id="btnTCG">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        TCGPlayer
      </button>
      <button class="action-btn" id="btnCM">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Cardmarket
      </button>
    </div>

    <!-- Mobile ··· button -->
    <button class="lb-more-btn" id="btnMore">···</button>
  </div>
</div>

<!-- Action sheet (mobile) -->
<div class="action-sheet-overlay" id="sheetOverlay"></div>
<div class="action-sheet" id="actionSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">Card name</div>
  <div class="sheet-item" id="sheetCopy">
    <div class="icon copy"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8080c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
    <div class="label"><div class="title">Copy link</div><div class="desc">Scryfall card page</div></div>
  </div>
  <div class="sheet-item" id="sheetShare">
    <div class="icon share"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#80c080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
    <div class="label"><div class="title">Share</div><div class="desc">Via your apps</div></div>
  </div>
  <div class="sheet-divider"></div>
  <div class="sheet-item" id="sheetTCG">
    <div class="icon tcg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c08080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
    <div class="label"><div class="title">TCGPlayer</div><div class="desc">Buy in the US market</div></div>
  </div>
  <div class="sheet-item" id="sheetCM">
    <div class="icon cm"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8080c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
    <div class="label"><div class="title">Cardmarket</div><div class="desc">Buy in the EU market</div></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let currentCard = null;

  async function loadCard() {
    const res = await fetch('https://api.scryfall.com/cards/random?q=has:illustration+is:hires');
    if (!res.ok) return;
    currentCard = await res.json();
    const art = currentCard.image_uris?.art_crop || currentCard.card_faces?.[0]?.image_uris?.art_crop;
    document.getElementById('lbArt').src = art;
    document.getElementById('lbBg').style.backgroundImage = `url('${art}')`;
    document.getElementById('lbName').textContent = currentCard.name;
    document.getElementById('lbDetails').textContent = `${currentCard.artist || 'Unknown'} · ${currentCard.set_name || ''} · ${currentCard.released_at?.slice(0,4) || ''}`;
    document.getElementById('sheetTitle').textContent = currentCard.name;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function copyLink() {
    if (!currentCard) return;
    const url = currentCard.scryfall_uri || `https://scryfall.com/card/${currentCard.set}/${currentCard.collector_number}`;
    navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => showToast('Copy failed'));
  }

  function shareCard() {
    if (!currentCard) return;
    const url = currentCard.scryfall_uri || `https://scryfall.com/card/${currentCard.set}/${currentCard.collector_number}`;
    if (navigator.share) {
      navigator.share({ title: currentCard.name, text: `${currentCard.name} — art by ${currentCard.artist}`, url });
    } else {
      navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
    }
  }

  function openTCG() {
    if (!currentCard) return;
    window.open(`https://www.tcgplayer.com/search/magic/product?q=${encodeURIComponent(currentCard.name)}`, '_blank');
  }

  function openCM() {
    if (!currentCard) return;
    window.open(`https://www.cardmarket.com/en/Magic/Products/Search?searchString=${encodeURIComponent(currentCard.name)}`, '_blank');
  }

  function openSheet() {
    document.getElementById('sheetOverlay').style.display = 'block';
    setTimeout(() => document.getElementById('actionSheet').classList.add('open'), 10);
  }

  function closeSheet() {
    document.getElementById('actionSheet').classList.remove('open');
    setTimeout(() => document.getElementById('sheetOverlay').style.display = 'none', 280);
  }

  // Desktop
  document.getElementById('btnCopy').addEventListener('click', copyLink);
  document.getElementById('btnShare').addEventListener('click', shareCard);
  document.getElementById('btnTCG').addEventListener('click', openTCG);
  document.getElementById('btnCM').addEventListener('click', openCM);

  // Mobile sheet
  document.getElementById('btnMore').addEventListener('click', openSheet);
  document.getElementById('sheetOverlay').addEventListener('click', closeSheet);
  document.getElementById('sheetCopy').addEventListener('click', () => { closeSheet(); setTimeout(copyLink, 300); });
  document.getElementById('sheetShare').addEventListener('click', () => { closeSheet(); setTimeout(shareCard, 300); });
  document.getElementById('sheetTCG').addEventListener('click', () => { closeSheet(); setTimeout(openTCG, 300); });
  document.getElementById('sheetCM').addEventListener('click', () => { closeSheet(); setTimeout(openCM, 300); });

  // View toggle (simulate breakpoints)
  document.getElementById('btnDesktopView').addEventListener('click', () => {
    document.getElementById('actionsDesktop').style.display = 'flex';
    document.getElementById('btnMore').style.display = 'none';
    document.getElementById('btnDesktopView').classList.add('active');
    document.getElementById('btnMobileView').classList.remove('active');
  });
  document.getElementById('btnMobileView').addEventListener('click', () => {
    document.getElementById('actionsDesktop').style.display = 'none';
    document.getElementById('btnMore').style.display = 'block';
    document.getElementById('btnMobileView').classList.add('active');
    document.getElementById('btnDesktopView').classList.remove('active');
  });
  document.getElementById('btnLoadNew').addEventListener('click', loadCard);

  loadCard();
</script>
</body>
</html>
