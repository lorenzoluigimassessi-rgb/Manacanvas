<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ManaCanvas — Draw</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Josefin+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0f;
      font-family: 'Josefin Sans', sans-serif;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Entry ── */
    #entryBtn {
      background: #16161f;
      border: 1px solid #4a4a60;
      color: #c8c8e0;
      padding: 0.9rem 2.5rem;
      border-radius: 4px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 150ms, border-color 150ms;
    }
    #entryBtn:hover { background: #1e1e2e; border-color: #8080a8; color: #e8e8f8; }

    /* ── Draw overlay ── */
    #draw {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #draw.open { display: flex; }

    /* Gradient background — fills whole screen */
    #dGrad {
      position: absolute;
      inset: 0;
      z-index: 0;
      transition: background 400ms ease;
      background: #0c0c0f;
    }

    /* Card stage — centered, constrained */
    #dStage {
      position: relative;
      z-index: 2;
      width: min(92vw, 560px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      user-select: none;
    }

    /* Art card */
    #dArt {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      will-change: transform;
      cursor: pointer;
      position: relative;
    }

    #dArt img {
      width: 100%;
      display: block;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #1a1a22;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* Incoming card — sits behind current during transition */
    #dIn {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }
    #dIn img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    /* Card meta below the art */
    #dMeta {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      opacity: 0;
      transition: opacity 300ms;
      padding: 0 0.2rem;
    }
    #dMeta.visible { opacity: 1; }
    #dMeta .left { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(240,240,240,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 0.7rem;
      color: rgba(240,240,240,0.35);
      margin-top: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Toggle */
    #dToggle {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #dToggle button {
      background: transparent;
      border: none;
      color: rgba(240,240,240,0.35);
      padding: 0.3rem 0.85rem;
      font-size: 0.7rem;
      font-family: 'Josefin Sans', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 150ms, color 150ms;
    }
    #dToggle button.active {
      background: rgba(255,255,255,0.1);
      color: rgba(240,240,240,0.85);
    }

    /* Swipe hint */
    #dHint {
      font-size: 0.62rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(240,240,240,0.18);
      transition: opacity 1s;
    }

    /* Loading */
    #dLoad {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      background: #0c0c0f;
    }
    #dLoad.hidden { display: none; }
    .spinner {
      width: 40px; height: 54px;
      border: 1.5px solid rgba(240,240,240,0.15);
      border-radius: 5px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #dLoad p {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240,240,240,0.25);
    }
    @keyframes pulse {
      0%,100% { opacity: 0.2; transform: scale(0.95); }
      50%      { opacity: 0.55; transform: scale(1); }
    }

    /* Exit */
    #dExit {
      position: absolute;
      top: 1rem; right: 1rem;
      z-index: 10;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(12,12,15,0.55);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(240,240,240,0.6);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 150ms, color 150ms;
      backdrop-filter: blur(4px);
    }
    #dExit:hover { background: rgba(30,30,40,0.8); color: #f0f0f0; }

    /* Desktop prev/next arrows beside the card */
    .darrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 36px; height: 52px;
      background: rgba(12,12,15,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(240,240,240,0.5);
      border-radius: 4px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 200ms, background 150ms;
      backdrop-filter: blur(4px);
    }
    .darrow:hover { background: rgba(30,30,40,0.7); color: #f0f0f0; }
    #dPrev { right: calc(100% + 0.75rem); }
    #dNext { left:  calc(100% + 0.75rem); }

    /* Detail panel */
    #dDetail {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      pointer-events: none;
    }
    #dDetail.open { pointer-events: auto; }
    #dDetailBg {
      position: absolute;
      inset: 0;
      background: rgba(12,12,15,0.55);
      opacity: 0;
      transition: opacity 200ms;
    }
    #dDetail.open #dDetailBg { opacity: 1; }
    #dDetailPanel {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: rgba(14,14,20,0.96);
      border-top: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px 12px 0 0;
      padding: 1.5rem 1.5rem 2.5rem;
      transform: translateY(100%);
      transition: transform 320ms cubic-bezier(0.34,1.56,0.64,1);
      backdrop-filter: blur(16px);
    }
    #dDetail.open #dDetailPanel { transform: translateY(0); }
    .dp-name {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .dp-meta { font-size: 0.78rem; color: rgba(240,240,240,0.4); margin-bottom: 1.2rem; }
    .dp-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .dp-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(240,240,240,0.65);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      font-size: 0.73rem;
      font-family: 'Josefin Sans', sans-serif;
      cursor: pointer;
      transition: border-color 150ms, color 150ms;
    }
    .dp-btn:hover { border-color: rgba(255,255,255,0.45); color: #f0f0f0; }
    .dp-back {
      background: none; border: none;
      color: rgba(240,240,240,0.3);
      font-size: 0.73rem;
      font-family: 'Josefin Sans', sans-serif;
      cursor: pointer;
      transition: color 150ms;
    }
    .dp-back:hover { color: rgba(240,240,240,0.75); }

    @media (max-width: 600px) {
      .darrow { display: none; }
    }
  </style>
</head>
<body>

  <button id="entryBtn">✦ Draw a card</button>

  <div id="draw">
    <div id="dGrad"></div>
    <div id="dLoad">
      <div class="spinner"></div>
      <p>Drawing...</p>
    </div>
    <button id="dExit">✕</button>

    <div id="dStage">
      <button class="darrow" id="dPrev">‹</button>
      <button class="darrow" id="dNext">›</button>

      <div id="dArt">
        <div id="dIn"><img src="" alt=""></div>
        <img src="" alt="">
      </div>

      <div id="dMeta">
        <div class="left">
          <div class="card-name" id="dName"></div>
          <div class="card-sub"  id="dSub"></div>
        </div>
        <div id="dToggle">
          <button id="tArt"  class="active">Art</button>
          <button id="tCard">Card</button>
        </div>
      </div>

      <div id="dHint">Swipe or use ← →</div>
    </div>
  </div>

  <div id="dDetail">
    <div id="dDetailBg"></div>
    <div id="dDetailPanel">
      <div class="dp-name" id="dpName"></div>
      <div class="dp-meta" id="dpMeta"></div>
      <div class="dp-actions" id="dpActions"></div>
      <button class="dp-back" id="dpBack">← Back to Draw</button>
    </div>
  </div>

  <script>
  // ── Gradients ──────────────────────────────────────────────────────────────
  const GRAD = {
    W: 'linear-gradient(160deg,#2a2318,#3d3420,#1a1610)',
    U: 'linear-gradient(160deg,#0a1628,#0d2240,#061018)',
    B: 'linear-gradient(160deg,#0e0a18,#1a1030,#080610)',
    R: 'linear-gradient(160deg,#1e0c08,#2e1408,#180a06)',
    G: 'linear-gradient(160deg,#081a0c,#0e2810,#061208)',
    M: 'linear-gradient(160deg,#1e1808,#2e2410,#181206)',
    C: 'linear-gradient(160deg,#141420,#1e1e2e,#0e0e18)',
  };
  function grad(colors) {
    if (!colors || !colors.length) return GRAD.C;
    if (colors.length > 1) return GRAD.M;
    return GRAD[colors[0]] || GRAD.C;
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let queue = [], history = [], idx = -1;
  let mode = 'art', open = false, fetching = false;
  let sx = 0, sy = 0, cx = 0, dragging = false, ddir = null;
  let arrowT = null, metaT = null;

  // ── DOM ────────────────────────────────────────────────────────────────────
  const drawEl   = document.getElementById('draw');
  const gradEl   = document.getElementById('dGrad');
  const artEl    = document.getElementById('dArt');
  const artImg   = artEl.querySelector(':scope > img');
  const incEl    = document.getElementById('dIn');
  const incImg   = incEl.querySelector('img');
  const loadEl   = document.getElementById('dLoad');
  const metaEl   = document.getElementById('dMeta');
  const hintEl   = document.getElementById('dHint');

  // ── Entry ──────────────────────────────────────────────────────────────────
  document.getElementById('entryBtn').addEventListener('click', enter);

  async function enter() {
    if (open) return;
    open = true;
    queue = []; history = []; idx = -1; mode = 'art';
    syncToggle();
    drawEl.classList.add('open');
    document.body.style.overflow = 'hidden';
    loadEl.classList.remove('hidden');
    metaEl.classList.remove('visible');
    await fetchBatch();
    loadEl.classList.add('hidden');
    showCard();
    bindEvents();
    setTimeout(() => { hintEl.style.opacity = '0'; }, 4000);
  }

  function exit() {
    if (!open) return;
    open = false;
    drawEl.classList.remove('open');
    document.body.style.overflow = '';
    unbindEvents();
    closeDetail();
    stopParallax();
  }

  // ── Cards ──────────────────────────────────────────────────────────────────
  function showCard() {
    const card = queue.shift();
    if (!card) return;
    history.push(card);
    idx = history.length - 1;
    render(card);
    startParallax();
    prefetchCheck();
  }

  function render(card) {
    gradEl.style.background = grad(card.colors);
    artImg.src = imgUrl(card);
    updateMeta(card);
  }

  function updateMeta(card) {
    document.getElementById('dName').textContent = card.name || '';
    document.getElementById('dSub').textContent  = [
      card.artist ? `by ${card.artist}` : '',
      card.set_name || ''
    ].filter(Boolean).join(' · ');
    metaEl.classList.add('visible');
    clearTimeout(metaT);
    metaT = setTimeout(() => metaEl.classList.remove('visible'), 3500);
  }

  function imgUrl(card) {
    const u = card.image_uris || card.card_faces?.[0]?.image_uris || {};
    return mode === 'card' ? (u.normal || u.art_crop || '') : (u.art_crop || u.normal || '');
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  function next() {
    if (idx < history.length - 1) { idx++; transition(history[idx], 'next'); return; }
    if (!queue.length) return;
    const card = queue.shift();
    history.push(card); idx = history.length - 1;
    transition(card, 'next');
    prefetchCheck();
  }

  function prev() {
    if (idx <= 0) return;
    idx--;
    transition(history[idx], 'prev');
  }

  // ── Transition ─────────────────────────────────────────────────────────────
  function transition(card, dir) {
    const url   = imgUrl(card);
    const fromX = dir === 'next' ? '100%' : '-100%';
    const toX   = dir === 'next' ? '-100%' : '100%';

    incImg.src             = url;
    incEl.style.transition = 'none';
    incEl.style.transform  = `translateX(${fromX})`;
    incEl.style.opacity    = '1';
    gradEl.style.background = grad(card.colors);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      artEl.style.transition = 'transform 280ms ease-in-out, opacity 280ms ease-in-out';
      incEl.style.transition = 'transform 280ms ease-in-out';
      artEl.style.transform  = `translateX(${toX})`;
      artEl.style.opacity    = '0';
      incEl.style.transform  = 'translateX(0)';
    }));

    setTimeout(() => {
      artImg.src             = url;
      artEl.style.transition = 'none';
      artEl.style.transform  = '';
      artEl.style.opacity    = '1';
      incEl.style.transition = 'none';
      incEl.style.transform  = `translateX(${fromX})`;
      incEl.style.opacity    = '0';
      updateMeta(card);
    }, 300);
  }

  // ── Toggle ─────────────────────────────────────────────────────────────────
  function syncToggle() {
    document.getElementById('tArt').classList.toggle('active',  mode === 'art');
    document.getElementById('tCard').classList.toggle('active', mode === 'card');
  }
  document.getElementById('tArt').addEventListener('click', () => {
    mode = 'art'; syncToggle(); if (history[idx]) render(history[idx]);
  });
  document.getElementById('tCard').addEventListener('click', () => {
    mode = 'card'; syncToggle(); if (history[idx]) render(history[idx]);
  });

  // ── Drag ───────────────────────────────────────────────────────────────────
  function dragStart(x, y) { sx = x; sy = y; cx = x; dragging = true; ddir = null; }

  function dragMove(x, y) {
    if (!dragging) return;
    cx = x;
    const dx = x - sx, dy = y - sy;
    if (!ddir) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8)
        ddir = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
      return;
    }
    if (ddir === 'v') return;

    artEl.style.transition = 'none';
    artEl.style.transform  = `translateX(${dx}px) rotate(${(dx / window.innerWidth) * 4}deg)`;

    const peek = dx < 0
      ? (idx < history.length - 1 ? history[idx + 1] : queue[0])
      : (idx > 0 ? history[idx - 1] : null);
    if (peek) {
      const pu = imgUrl(peek);
      if (incImg.src !== pu) incImg.src = pu;
      const prog = Math.min(Math.abs(dx) / (window.innerWidth * 0.28), 1);
      incEl.style.transition = 'none';
      incEl.style.transform  = `translateX(calc(${dx < 0 ? '100%' : '-100%'} + ${dx < 0 ? -1 : 1} * ${Math.abs(dx) * 0.25}px))`;
      incEl.style.opacity    = String(prog * 0.7);
    }
  }

  function dragEnd(x, y) {
    if (!dragging) return;
    dragging = false;
    const dx = x - sx, dy = y - sy;
    if (ddir === 'v' && dy > 80) { resetArt(); exit(); return; }
    if (ddir !== 'h') { snapBack(); return; }
    if (Math.abs(dx) >= window.innerWidth * 0.28) {
      resetArt(); if (dx < 0) next(); else prev();
    } else { snapBack(); }
  }

  function resetArt() {
    artEl.style.transition = 'none'; artEl.style.transform = ''; artEl.style.opacity = '1';
    incEl.style.opacity = '0';
  }
  function snapBack() {
    artEl.style.transition = 'transform 220ms cubic-bezier(0.34,1.56,0.64,1), opacity 220ms ease';
    artEl.style.transform = ''; artEl.style.opacity = '1';
    incEl.style.transition = 'opacity 220ms ease'; incEl.style.opacity = '0';
    setTimeout(() => { artEl.style.transition = ''; incEl.style.transition = ''; }, 220);
  }

  // ── Arrows ─────────────────────────────────────────────────────────────────
  function showArrows() {
    document.getElementById('dPrev').style.opacity = idx > 0 ? '1' : '0';
    document.getElementById('dNext').style.opacity = '1';
    clearTimeout(arrowT);
    arrowT = setTimeout(() => {
      document.getElementById('dPrev').style.opacity = '0';
      document.getElementById('dNext').style.opacity = '0';
    }, 2000);
  }

  // ── Detail ─────────────────────────────────────────────────────────────────
  function openDetail() {
    if (Math.abs(cx - sx) > 8) return;
    const card = history[idx]; if (!card) return;
    document.getElementById('dpName').textContent = card.name || '';
    document.getElementById('dpMeta').textContent = [
      card.artist ? `Illustrated by ${card.artist}` : '',
      card.set_name || '',
      card.released_at ? card.released_at.slice(0,4) : ''
    ].filter(Boolean).join(' · ');
    const acts = document.getElementById('dpActions');
    acts.innerHTML = '';
    if (card.artist) {
      const b = document.createElement('button'); b.className = 'dp-btn';
      b.textContent = 'Browse by artist';
      b.onclick = () => { closeDetail(); exit(); };
      acts.appendChild(b);
    }
    if (card.set_name) {
      const b = document.createElement('button'); b.className = 'dp-btn';
      b.textContent = 'Browse by set';
      b.onclick = () => { closeDetail(); exit(); };
      acts.appendChild(b);
    }
    document.getElementById('dDetail').classList.add('open');
  }
  function closeDetail() { document.getElementById('dDetail').classList.remove('open'); }
  document.getElementById('dpBack').addEventListener('click', closeDetail);
  document.getElementById('dDetailBg').addEventListener('click', closeDetail);

  // ── Parallax ───────────────────────────────────────────────────────────────
  let pActive = false, pRAF = null, tX = 0, tY = 0, pX = 0, pY = 0;
  function startParallax() {
    pActive = true; window.addEventListener('mousemove', onPM); pLoop();
  }
  function stopParallax() {
    pActive = false; window.removeEventListener('mousemove', onPM);
    cancelAnimationFrame(pRAF);
    artEl.style.transform = ''; gradEl.style.transform = '';
  }
  function onPM(e) {
    tX = (e.clientX - window.innerWidth  / 2) / (window.innerWidth  / 2);
    tY = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
  }
  function pLoop() {
    if (!pActive) return;
    pX += (tX - pX) * 0.06; pY += (tY - pY) * 0.06;
    if (!dragging) {
      artEl.style.transform  = `translate(${pX * 4}px,${pY * 4}px)`;
      gradEl.style.transform = `translate(${-pX * 2}px,${-pY * 2}px)`;
    }
    pRAF = requestAnimationFrame(pLoop);
  }

  // ── API ────────────────────────────────────────────────────────────────────
  async function fetchBatch() {
    if (fetching) return; fetching = true;
    const calls = Array.from({ length: 8 }, () =>
      fetch('https://api.scryfall.com/cards/random?q=has:illustration')
        .then(r => r.json()).catch(() => null)
    );
    const res = await Promise.all(calls);
    queue.push(...res.filter(Boolean));
    fetching = false;
  }
  function prefetchCheck() { if (queue.length <= 2 && !fetching) fetchBatch(); }

  // ── Events ─────────────────────────────────────────────────────────────────
  function bindEvents() {
    drawEl.addEventListener('touchstart',  onTS, { passive: true });
    drawEl.addEventListener('touchmove',   onTM, { passive: true });
    drawEl.addEventListener('touchend',    onTE);
    drawEl.addEventListener('mousedown',   onMD);
    drawEl.addEventListener('mousemove',   showArrows);
    drawEl.addEventListener('wheel',       onW, { passive: true });
    window.addEventListener('mousemove',   onWM);
    window.addEventListener('mouseup',     onWU);
    window.addEventListener('keydown',     onK);
    document.getElementById('dExit').addEventListener('click', exit);
    document.getElementById('dPrev').addEventListener('click', prev);
    document.getElementById('dNext').addEventListener('click', next);
    artEl.addEventListener('click', openDetail);
  }
  function unbindEvents() {
    drawEl.removeEventListener('touchstart',  onTS);
    drawEl.removeEventListener('touchmove',   onTM);
    drawEl.removeEventListener('touchend',    onTE);
    drawEl.removeEventListener('mousedown',   onMD);
    drawEl.removeEventListener('mousemove',   showArrows);
    drawEl.removeEventListener('wheel',       onW);
    window.removeEventListener('mousemove',   onWM);
    window.removeEventListener('mouseup',     onWU);
    window.removeEventListener('keydown',     onK);
  }
  function onTS(e) { dragStart(e.touches[0].clientX, e.touches[0].clientY); }
  function onTM(e) { dragMove(e.touches[0].clientX, e.touches[0].clientY); }
  function onTE(e) { dragEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }
  function onMD(e) { dragStart(e.clientX, e.clientY); }
  function onWM(e) { if (dragging) dragMove(e.clientX, e.clientY); }
  function onWU(e) { if (dragging) dragEnd(e.clientX, e.clientY); }
  function onW(e)  { if (e.deltaY > 0) next(); }
  function onK(e) {
    if (!open) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
    if (e.key === 'Escape') {
      if (document.getElementById('dDetail').classList.contains('open')) closeDetail();
      else exit();
    }
  }
  </script>
